<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wireframe 3D</title>

    <style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .layout {
    display: flex;
    height: 100vh;
  }

  .sidebar {
    width: 600px;
    background: #111;
    color: white;
    padding: 40px;
  }

  #canvas-container {
    flex: 1;
  }
</style>

</head>
<body>

<div class="layout">
  
  <div class="sidebar">
    <h1>MODULE 01</h1>
    <p>
      Это самое банальное, но самое душевное место во всем корпусе. Именно здесь, в туалете на 4 этаже, узнаются самые важные новости и слышатся самые интересные истории.
    </p>
  </div>

  <div id="canvas-container"></div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js';

// сцена
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const light = new THREE.AmbientLight(0xffffff, 1);
scene.add(light);

// камера
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.set(0, 2, 10);

// рендер
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// управление
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// загрузка модели
const loader = new GLTFLoader();

loader.load(
  'model.glb',

function (gltf) {
  console.log('МОДЕЛЬ ЗАГРУЗИЛАСЬ');

    const model = gltf.scene;

const box = new THREE.Box3().setFromObject(model);
const center = box.getCenter(new THREE.Vector3());

model.position.x -= center.x;
model.position.y -= center.y;
model.position.z -= center.z;

    // увеличим
    model.scale.set(5, 5, 5);

     model.traverse((child) => {
      if (child.isMesh) {
        child.material = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          wireframe: true
        });
      }
    });

    scene.add(model);

model.scale.set(10, 10, 10);

controls.target.copy(model.position);
controls.update();

camera.lookAt(0, 0, 0);
  },

  function (progress) {
    console.log('Загрузка:', progress.loaded);
  },

  function (error) {
    console.error('Ошибка загрузки модели:', error);
  }
);

// resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// анимация
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}



animate();
</script>

</body>
</html>
