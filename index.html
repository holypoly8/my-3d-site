<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Wireframe 3D</title>

    <style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .layout {
    display: flex;
    height: 100vh;
  }

  .sidebar {
    width: 380px;
    background: #111;
    color: white;
    padding: 30px;
  }

  #canvas-container {
    flex: 1;
  }
</style>

</head>
<body>

<div class="layout">
  
  <div class="sidebar">
    <h1>MODULE 01</h1>
    <p>
      Это самое банальное, но самое душевное место во всем корпусе. Именно здесь, в туалете на 4 этаже, узнаются самые важные новости и слышатся самые интересные истории.
    </p>
  </div>

  <div id="canvas-container"></div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js';

// сцена
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const light = new THREE.AmbientLight(0xffffff, 1);
scene.add(light);

// камера
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);


// рендер
const renderer = new THREE.WebGLRenderer({ antialias: true });
const container = document.getElementById('canvas-container');

renderer.setSize(
  container.clientWidth,
  container.clientHeight
);

renderer.setClearColor(0x000000);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// управление
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// загрузка модели
const loader = new GLTFLoader();

loader.load(
  'model.glb',

function (gltf) {
  console.log('МОДЕЛЬ ЗАГРУЗИЛАСЬ');

    const model = gltf.scene;

// сначала масштабируем
model.scale.set(12, 10, 10);

// потом считаем размеры
const box = new THREE.Box3().setFromObject(model);
const size = box.getSize(new THREE.Vector3());
const center = box.getCenter(new THREE.Vector3());

// центрируем модель
model.position.sub(center);

     model.traverse((child) => {
      if (child.isMesh) {
        child.material = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          wireframe: true
        });
      }
    });

    scene.add(model);

// расстояние камеры от модели
const maxDim = Math.max(size.x, size.y, size.z);
const distance = maxDim * 1.5;

camera.position.set(0, distance * 0.2, distance);
camera.lookAt(0, 0, 0);

controls.target.set(0, 0, 0);
controls.update();

  },

  function (progress) {
    console.log('Загрузка:', progress.loaded);
  },

  function (error) {
    console.error('Ошибка загрузки модели:', error);
  }
);

// resize
window.addEventListener('resize', () => {
  const container = document.getElementById('canvas-container');

  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(
    container.clientWidth,
    container.clientHeight
  );
});

// анимация
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}



animate();
</script>

</body>
</html>
